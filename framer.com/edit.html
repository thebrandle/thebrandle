	<script>
		// Keep these keys in sync with DarkModeProvider.tsx
		var userDarkMode = localStorage.getItem("dark-mode") === "true"
		var overrideSystem = localStorage.getItem("dark-mode-override-system") === "true"
		var systemDarkMode = matchMedia("(prefers-color-scheme: dark)").matches
		var isDarkMode = overrideSystem ? userDarkMode : systemDarkMode
		if (isDarkMode) {
			document.body.classList.add("framer-theme-dark")
		}

		// Set release channel as class on body.
		var framerReleaseChannel = window.framerRelease && window.framerRelease.channel
		if (framerReleaseChannel) {
			document.body.classList.add("framer-release-" + framerReleaseChannel)
		}

		// Add a class to the body to indicate that the agent experiment is on and apply the agent theme
		// as the default theme.
		// TODO: Remove once experiment is removed.
		var storageKey = framerReleaseChannel ? "experiments-" + framerReleaseChannel : "experiments"
		try {
			var experiments = JSON.parse(localStorage.getItem(storageKey) || "{}")
			if (experiments.agent === "on") {
				document.body.classList.add("agent")
			}
		} catch (e) {
			// Ignore errors.
		}
	</script>

<!-- CUSTOM FORM SUBMIT SCRIPT -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const contactForms = document.querySelectorAll('form.framer-nunqm3');
    contactForms.forEach(form => {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const button = form.querySelector('button[type="submit"]');
        if(!button) return;
        
        const originalContent = button.innerHTML;
        const originalPointerEvents = button.style.pointerEvents;
        
        // Show loading state
        button.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;"><span style="font-size:18px;font-family:Inter,sans-serif;color:black">Sending...</span></div>';
        button.style.pointerEvents = 'none';
        
        const formData = new FormData(form);
        try {
            await fetch('https://formsubmit.co/ajax/thebrandleteam@gmail.com', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json'
                },
                body: formData
            });

            // Show success state with black check mark
            button.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;color:black;font-family:Inter,sans-serif;"><svg style="animation: checkAnim 0.5s ease-in-out;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><span style="font-weight:600;font-size:18px;">Sent successfully</span></div>';
            
            form.reset();

            // Revert after 4 seconds
            setTimeout(() => {
                button.innerHTML = originalContent;
                button.style.pointerEvents = originalPointerEvents;
            }, 4000);
            
        } catch (err) {
            button.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><span style="color:red;font-size:18px;font-family:Inter,sans-serif;">Error! Try again.</span></div>';
            setTimeout(() => {
                button.innerHTML = originalContent;
                button.style.pointerEvents = originalPointerEvents;
            }, 4000);
        }
      });
    });
  });
</script>
<style>
@keyframes checkAnim {
  0% { stroke-dasharray: 50; stroke-dashoffset: 50; }
  100% { stroke-dasharray: 50; stroke-dashoffset: 0; }
}
</style>
